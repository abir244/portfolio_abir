name: flutter_portfolio
description: A professional Flutter portfolio app for web and mobile.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^12.1.3
  url_launcher: ^6.2.2
  google_fonts: ^6.1.0
  animate_do: ^3.1.2
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  font_awesome_flutter: ^10.6.0
  visibility_detector: ^0.4.0+2
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/